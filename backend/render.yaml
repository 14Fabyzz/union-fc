services:
  - type: web
    name: union-fc-backend
    runtime: java
    buildCommand: "mvn clean package -DskipTests"
    startCommand: "java -jar target/gestion-pagos-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_HOURS
        value: "8"
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
