spring.application.name=gestion-pagos
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/escuela_futbol}

# Logging
logging.level.com.escuelafutbol=DEBUG

# Evolution API (WhatsApp)
evolution.api.url=${EVOLUTION_API_URL:http://localhost:8083}
evolution.api.key=${EVOLUTION_API_KEY:union-fc-secret-key}
evolution.instance.name=${EVOLUTION_INSTANCE:union-fc}

# Logo de la escuela
escuela.logo.path=${LOGO_PATH:../frontend/public/logo.png}
escuela.nombre=${ESCUELA_NOMBRE:Union FC}
escuela.mensualidad=${ESCUELA_MENSUALIDAD:60.000}
