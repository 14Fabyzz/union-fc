services:
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: union-evolution-api
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=union-fc-secret-key
      - STORE_MESSAGES=true
      - STORE_CONTACTS=true
    volumes:
      - evolution_data:/evolution/instances

volumes:
  evolution_data:
